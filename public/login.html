<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Almoxarifado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="particles-js"></div>
  <div class="app-shell">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-brand">
          <div class="brand-mark">A</div>
          <div>
            <h2>Almoxarifado</h2>
            <p>Entre para acessar o painel</p>
          </div>
        </div>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <input id="username" type="text" placeholder="Usuário" autocomplete="username" required>
          </div>
          <div class="form-group">
            <input id="password" type="password" placeholder="Senha" autocomplete="current-password" required>
          </div>
          <button type="submit" class="login-btn">Entrar</button>
          <p id="erro" class="error"></p>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.particlesJS) {
        particlesJS('particles-js', {
          particles: {
            number: { value: 70, density: { enable: true, value_area: 900 } },
            color: { value: '#ffffff' },
            shape: { type: 'circle' },
            opacity: { value: 0.45, random: false },
            size: { value: 2.3, random: true },
            line_linked: { enable: true, distance: 140, color: '#ffffff', opacity: 0.18, width: 1 },
            move: { enable: true, speed: 2.5, direction: 'none', random: false, straight: false, out_mode: 'out', bounce: false }
          },
          interactivity: {
            detect_on: 'canvas',
            events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' }, resize: true },
            modes: { repulse: { distance: 110, duration: 0.35 }, push: { particles_nb: 3 } }
          },
          retina_detect: true
        });
      }
    });

    const API_BASE = window.location.port === '3000' ? '' : 'http://localhost:3000';

    async function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch(API_BASE + '/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/index.html';
      } else {
        document.getElementById('erro').textContent = data.error;
      }
    }
  </script>
</body>
</html>
