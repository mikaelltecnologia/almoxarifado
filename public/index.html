<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almoxarifado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="particles-js"></div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">A</div>
        <div>
          <h1>Almoxarifado</h1>
          <p>Controle moderno de estoque e operações</p>
        </div>
      </div>
      <div class="topbar-actions">
        
        <button class="ghost-btn" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="content-layout">
      <aside class="nav-panel">
        <div class="nav-panel-title">Menu</div>
        <div class="tab-list">
          <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
          <button class="tab-btn" data-tab="cadastros">Cadastros</button>
          <button class="tab-btn" data-tab="movimentacao">Movimentação</button>
          <button class="tab-btn" data-tab="ficha">Ficha do Funcionário</button>
          <button class="tab-btn" data-tab="baixa">Baixa de Estoque</button>
        </div>
      </aside>

      <main class="content-panel">
        <div id="dashboard" class="tab-content active"></div>
        <div id="cadastros" class="tab-content"></div>
        <div id="movimentacao" class="tab-content"></div>
        <div id="ficha" class="tab-content"></div>
        <div id="baixa" class="tab-content"></div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="app.js"></script>
  <script src="chat.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.particlesJS) {
        particlesJS('particles-js', {
          particles: {
            number: { value: 70, density: { enable: true, value_area: 900 } },
            color: { value: '#ffffff' },
            shape: { type: 'circle' },
            opacity: { value: 0.45, random: false },
            size: { value: 2.3, random: true },
            line_linked: { enable: true, distance: 140, color: '#ffffff', opacity: 0.18, width: 1 },
            move: { enable: true, speed: 2.5, direction: 'none', random: false, straight: false, out_mode: 'out', bounce: false }
          },
          interactivity: {
            detect_on: 'canvas',
            events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' }, resize: true },
            modes: { repulse: { distance: 110, duration: 0.35 }, push: { particles_nb: 3 } }
          },
          retina_detect: true
        });
      }
    });
  </script>
  <!-- Floating support button (WhatsApp) -->
  <a id="support-fab" href="https://wa.me/5562992410881" target="_blank" rel="noopener noreferrer" aria-label="Suporte via WhatsApp">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M20.52 3.48A11.9 11.9 0 0012 0C5.373 0 0 5.373 0 12c0 2.11.552 4.08 1.6 5.82L0 24l6.47-1.6A11.92 11.92 0 0012 24c6.627 0 12-5.373 12-12 0-3.19-1.24-6.16-3.48-8.52zM12 21.5c-1.12 0-2.22-.2-3.25-.58l-.23-.09-3.84.95.97-3.74-.11-.25A9.5 9.5 0 012.5 12 9.5 9.5 0 1112 21.5z" fill="currentColor"/>
      <path d="M17.34 14.2c-.27-.14-1.6-.78-1.85-.87-.25-.09-.43-.14-.61.14-.18.27-.7.87-.86 1.05-.16.18-.32.2-.59.07-.27-.13-1.14-.42-2.17-1.34-.8-.71-1.34-1.58-1.5-1.86-.16-.27-.02-.42.12-.56.12-.12.27-.32.4-.48.13-.16.18-.27.28-.45.09-.18.04-.34-.02-.48-.07-.13-.61-1.47-.84-2.01-.22-.53-.45-.46-.61-.47-.16-.01-.34-.01-.52-.01-.18 0-.48.07-.73.34-.25.27-.96.94-.96 2.29 0 1.35.98 2.66 1.11 2.85.12.18 1.92 2.96 4.65 4.04 1.23.5 2.19.8 2.94 1.02 1.23.36 2.35.31 3.23.19.99-.13 1.6-.52 1.83-1.02.23-.5.23-.93.16-1.02-.07-.09-.26-.14-.53-.25z" fill="currentColor"/>
    </svg>
  </a>

  <!-- Widget de Suporte IA -->
  <div id="ai-chat-widget">
    <button id="ai-chat-btn" onclick="toggleChat()" aria-label="Assistente IA" aria-expanded="false">
      <svg id="ai-chat-icon-open" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <svg id="ai-chat-icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true" style="display:none">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      <span class="ai-chat-badge">IA</span>
    </button>

    <div id="ai-chat-panel" role="dialog" aria-label="Assistente IA do Almoxarifado">
      <div id="ai-chat-header">
        <div class="ai-chat-header-info">
          <div class="ai-chat-avatar">IA</div>
          <div>
            <div class="ai-chat-title">Assistente IA</div>
            <div class="ai-chat-subtitle">Tire dúvidas sobre o sistema</div>
          </div>
        </div>
        <button class="ai-chat-close-btn" onclick="toggleChat()" aria-label="Fechar chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="ai-chat-messages" role="log" aria-live="polite"></div>
      <div id="ai-chat-input-area">
        <input id="ai-chat-input" type="text" placeholder="Escreva sua dúvida..." autocomplete="off" maxlength="500">
        <button id="ai-chat-send" onclick="enviarMensagem()" aria-label="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</body>
</html>
